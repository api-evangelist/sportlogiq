aid: sportlogiq
name: Sportlogiq
description: >-
  Sportlogiq is a Montreal, Quebec-based sports analytics company that applies
  patented computer vision and machine learning to broadcast video to generate
  high-resolution player tracking, event, and performance datasets across ice
  hockey, soccer/global football, American football, and youth sports.
  Founded in 2015 by Olympic figure skater Craig Buntin and computer-vision
  PhD Mehrsan Javan, the company is led by CEO Mitchell Wasserman and employs
  roughly 75 people, including a research team of ~13 AI scientists with
  180+ patents and publications. Sportlogiq describes itself as the global
  leader in hockey analytics, with adoption across the majority of NHL
  franchises, 150+ professional and amateur hockey clubs worldwide,
  international hockey federations and leagues (SHL, PWHL, IIHF), NCAA hockey
  programs, NFL franchises, and global football organizations — collectively
  serving 220+ clients. In November 2024 Sportlogiq acquired 8BY8, a sports
  video infrastructure platform that combines multi-angle video, data
  streams, and audio for officiating, coaching, and player health workflows.
  In January 2026 Sportlogiq was itself acquired by Teamworks, where it
  continues to operate as the AI analytics layer of Teamworks' broader
  operating system for sport. Sportlogiq exposes its tracking and event data
  to teams, leagues, broadcasters, and analytics partners through a private
  partner API and bulk data feeds; there is no public developer portal, no
  self-service signup, no published OpenAPI specification, and no public
  SDKs or open-source repositories. Access is sold as part of commercial
  contracts and integrated directly into partner workflows.
